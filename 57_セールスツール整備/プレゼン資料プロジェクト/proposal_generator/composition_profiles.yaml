# composition_profiles.yaml
# ペルソナ別デフォルトスライド構成
#
# proposal_type: "ppa" または "epc"
# slides: スライドIDのリスト（この順序で出力）
# optional: 含めるかどうかをユーザーが選択できるスライド

profiles:
  稟議書対応:
    description: "設備担当者が稟議書に添付することを想定した構成。技術仕様・投資回収・補助金を重視。"
    proposal_type: ppa
    slides:
      - PP0         # 表紙
      - NEW_ff      # FF振り返り（ヒアリング結果）
      - PP4         # 現状電気代分析
      - PP5         # システム概要・仕様
      - PP6         # 発電シミュレーション
      - PP7         # 収益シミュレーション
      - PP8         # 投資回収・IRR
      - PP10        # 補助金活用
      - PP11        # スケジュール
      - NEW_summary # まとめ
    optional:
      - PP9         # デマンドカット
      - PP12        # 実績・事例
      - PP13        # FAQ

  経営者向け:
    description: "社長・CFO向け。コスト削減・ROI・環境インパクトを重視。枚数は最小限。"
    proposal_type: ppa
    slides:
      - PP0         # 表紙
      - NEW_ff      # FF振り返り
      - PP4         # 現状電気代分析
      - PP8         # 投資回収・IRR（経済効果一覧）
      - PP6         # 発電シミュレーション
      - NEW_env     # 環境訴求（CO₂削減・SDGs）
      - PP10        # 補助金活用
      - NEW_summary # まとめ
    optional:
      - PP9         # デマンドカット
      - NEW_urgency # 緊急性訴求
      - PP12        # 実績・事例

  環境重視:
    description: "ESG担当者向け。CO₂削減・環境価値・SDGs対応を前面に出した構成。"
    proposal_type: ppa
    slides:
      - PP0           # 表紙
      - PP1           # なぜ今オンサイトPPAなのか（脱炭素背景）
      - PP2           # PPAモデルとは
      - PP3           # 導入メリット
      - NEW_env       # 環境訴求（CO₂削減・SDGs）
      - PP6           # 発電シミュレーション
      - PP4           # 現状電気代分析
      - PP10          # 補助金活用
      - NEW_summary   # まとめ
    optional:
      - NEW_competitor # 他社比較表
      - PP12           # 実績・事例

  比較検討中:
    description: "他社との比較検討中、またはPPA vs EPC比較が必要な場合の構成。"
    proposal_type: ppa
    slides:
      - PP0                 # 表紙
      - NEW_ff              # FF振り返り
      - PP4                 # 現状電気代分析
      - NEW_ppa_epc_compare # PPA vs EPC 比較
      - NEW_competitor      # 他社比較表
      - PP6                 # 発電シミュレーション
      - PP8                 # 投資回収・IRR
      - PP10                # 補助金活用
      - NEW_urgency         # 緊急性訴求
      - NEW_summary         # まとめ
    optional:
      - PP9                 # デマンドカット
      - NEW_building_compare # A棟/B棟 経済効果比較
      - PP11                # スケジュール
      - PP12                # 実績・事例

  稟議書対応（EPC）:
    description: "EPC（販売）向け。投資回収・仕様重視の稟議書対応構成。"
    proposal_type: epc
    slides:
      - EP0         # 表紙（EPC）
      - NEW_ff      # FF振り返り（ヒアリング結果）
      - EP3         # システム概要（EPC）
      - EP4         # 経済効果・投資回収（EPC）
      - EP6         # 補助金活用（EPC）
      - EP7         # 導入スケジュール（EPC）
      - NEW_summary # まとめ
    optional:
      - EP5         # デマンドカット試算（EPC）
      - EP8         # 実績・導入事例（EPC）

  経営者向け（EPC）:
    description: "EPC（販売）向け。社長・CFO向け。コスト削減・ROI・環境インパクトを重視。枚数は最小限。"
    proposal_type: epc
    slides:
      - EP0         # 表紙（EPC）
      - NEW_ff      # FF振り返り
      - EP4         # 経済効果・投資回収（EPC）
      - NEW_env     # 環境訴求（CO₂削減・SDGs）
      - EP6         # 補助金活用（EPC）
      - NEW_summary # まとめ
    optional:
      - EP5         # デマンドカット試算（EPC）
      - NEW_urgency # 緊急性訴求
      - EP8         # 実績・導入事例（EPC）

  環境重視（EPC）:
    description: "EPC（販売）向け。ESG担当者向け。CO₂削減・環境価値・SDGs対応を前面に出した構成。"
    proposal_type: epc
    slides:
      - EP0         # 表紙（EPC）
      - EP1         # なぜ今EPCか
      - EP2         # EPCモデルとは
      - NEW_env     # 環境訴求（CO₂削減・SDGs）
      - EP3         # システム概要（EPC）
      - EP4         # 経済効果・投資回収（EPC）
      - EP6         # 補助金活用（EPC）
      - NEW_summary # まとめ
    optional:
      - NEW_competitor # 他社比較表
      - EP8            # 実績・導入事例（EPC）

  比較検討中（EPC）:
    description: "EPC（販売）向け。他社との比較検討中、またはEPC vs PPA比較が必要な場合の構成。"
    proposal_type: epc
    slides:
      - EP0                 # 表紙（EPC）
      - NEW_ff              # FF振り返り
      - NEW_ppa_epc_compare # PPA vs EPC 比較
      - NEW_competitor      # 他社比較表
      - EP3                 # システム概要（EPC）
      - EP4                 # 経済効果・投資回収（EPC）
      - EP6                 # 補助金活用（EPC）
      - NEW_urgency         # 緊急性訴求
      - NEW_summary         # まとめ
    optional:
      - EP5                  # デマンドカット試算（EPC）
      - NEW_building_compare # A棟/B棟 経済効果比較
      - EP7                  # 導入スケジュール（EPC）
      - EP8                  # 実績・導入事例（EPC）

# 全スライドカタログ（IDと説明）
slide_catalog:
  # PPA 既存スライド
  PP0:  {title: "表紙",                     type: ppa, category: 基本}
